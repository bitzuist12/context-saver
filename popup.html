<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a1a2e;
      color: #7c8aff;
      font-weight: 500;
    }
    .site-info {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .site-info .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .site-info .value {
      font-size: 14px;
      color: #fff;
    }
    .save-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #7c8aff;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #6b79ee; }
    .save-btn:active { background: #5a68dd; }
    .save-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .settings {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #222;
    }
    .settings label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #141414;
      color: #e5e5e5;
      font-size: 12px;
      font-family: monospace;
    }
    .settings input:focus {
      outline: none;
      border-color: #7c8aff;
    }
    .settings .hint {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }
    .settings-status {
      min-height: 16px;
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }
    .settings-status.success { color: #4ade80; }
    .settings-status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Context Saver</h1>
    <span class="badge" id="siteType">detecting...</span>
  </div>

  <div class="site-info">
    <div class="label">Page</div>
    <div class="value" id="pageTitle">Loading...</div>
  </div>

  <button class="save-btn" id="saveBtn">Save as Markdown</button>
  <div class="status" id="status"></div>

  <div class="settings">
    <label>Default save folder prefix</label>
    <input type="text" id="folderPath" value="ContextSaver">
    <div class="hint">Example: <code>Hamilton</code> saves to <code>Downloads/Hamilton/chatgpt/...</code></div>
    <div class="hint">This is saved as your default for future saves.</div>
    <div class="hint">To save on Desktop, change Chrome's download location at <code>chrome://settings/downloads</code>.</div>
    <div class="settings-status" id="folderStatus"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
